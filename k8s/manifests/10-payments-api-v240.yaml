apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-v2-4-0
  namespace: prod
  labels:
    app: payments-api
    version: v2.4.0
spec:
  replicas: 4
  selector:
    matchLabels:
      app: payments-api
      version: v2.4.0
  template:
    metadata:
      labels:
        app: payments-api
        version: v2.4.0
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-conf
          configMap:
            name: payments-api-v240-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-api-v240-nginx
  namespace: prod
data:
  default.conf: |
    server {
      listen 80;
      location = /health { return 200 "ok"; }
      location / { return 200 "payments-api v2.4.0"; }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api-v2-4-0
  namespace: prod
  labels:
    app: payments-api
    version: v2.4.0
spec:
  selector:
    app: payments-api
    version: v2.4.0
  ports:
    - port: 80
      targetPort: 80
      name: http
